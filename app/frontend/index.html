<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Task Manager Pro</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Authentication Wrapper -->
    <div id="auth-wrapper" class="auth-wrapper">
        <div class="auth-container">
            <h1 id="auth-title">Welcome Back</h1>
            
            <div id="login-view">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit">Log In</button>
                    <div class="toggle-link" onclick="toggleAuthView('signup')">Don't have an account? Sign up</div>
                </form>
            </div>

            <div id="signup-view" class="hidden">
                <form id="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required>
                    </div>
                    <button type="submit">Create Account</button>
                    <div class="toggle-link" onclick="toggleAuthView('login')">Already have an account? Log in</div>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard Wrapper -->
    <div id="dashboard-wrapper" class="dashboard-wrapper hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-check-double"></i> TaskMaster
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" onclick="filterTasks('all')"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="#" class="nav-item" onclick="filterTasks('all')"><i class="fa-solid fa-list-check"></i> All Tasks</a>
                <a href="#" class="nav-item" onclick="filterTasks('completed')"><i class="fa-solid fa-check-circle"></i> Completed Tasks</a>
                <a href="#" class="nav-item" onclick="filterTasks('pending')"><i class="fa-regular fa-clock"></i> Pending Tasks</a>
                <a href="#" class="nav-item" onclick="filterTasks('work')"><i class="fa-solid fa-briefcase"></i> Work</a>
                <a href="#" class="nav-item" onclick="filterTasks('personal')"><i class="fa-solid fa-user"></i> Personal</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search tasks..." oninput="searchTasks()">
                </div>
                <div class="header-right">
                    <button class="add-task-btn" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Task</button>
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-solid fa-user"></i></div>
                        <button class="logout-btn" onclick="handleLogout()">Logout</button>
                    </div>
                </div>
            </header>

            <!-- Overview Cards -->
            <section class="overview-cards">
                <div class="card card-total">
                    <div class="card-icon"><i class="fa-solid fa-clipboard-list"></i></div>
                    <div class="card-info">
                        <h3>Total Tasks</h3>
                        <p id="count-total">0</p>
                    </div>
                </div>
                <div class="card card-completed">
                    <div class="card-icon"><i class="fa-solid fa-check"></i></div>
                    <div class="card-info">
                        <h3>Completed</h3>
                        <p id="count-completed">0</p>
                    </div>
                </div>
                <div class="card card-pending">
                    <div class="card-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="card-info">
                        <h3>Pending</h3>
                        <p id="count-pending">0</p>
                    </div>
                </div>
                <div class="card card-overdue">
                    <div class="card-icon"><i class="fa-solid fa-exclamation-triangle"></i></div>
                    <div class="card-info">
                        <h3>Overdue</h3>
                        <p id="count-overdue">0</p>
                    </div>
                </div>
            </section>

            <!-- Task List -->
            <section class="task-section">
                <h2 id="section-title">All Tasks</h2>
                <div id="tasks" class="task-list">
                    <!-- Tasks injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Task</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <form id="add-task-form" onsubmit="addTask(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-desc" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="task-due-date">
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="task-priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="task-category">
                            <option value="Personal" selected>Personal</option>
                            <option value="Work">Work</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Save Task</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
